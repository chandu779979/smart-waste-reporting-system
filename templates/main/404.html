{% extends 'base.html' %}

{% block title %}Page Not Found - SWM System{% endblock %}

{% block content %}
<div class="container my-5 py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-glass p-5">
                <div class="mb-4">
                    <i class="fa-solid fa-dumpster-fire text-danger" style="font-size: 6rem;"></i>
                </div>
                <h1 class="display-3 fw-bold text-white mb-2">404</h1>
                <h3 class="mb-4">Page Not Found</h3>
                <p class="text-muted mb-5">
                    The page you are looking for does not exist, or has been relocated to another recycling bin.
                </p>
                <div class="d-grid gap-2 col-8 mx-auto">
                    <a href="{{ url_for('main.index') }}" class="btn btn-primary-gradient btn-lg">
                        <i class="fa-solid fa-house me-2"></i>Go back home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
