services:
  - type: web
    name: smart-waste-reporting-system
    env: python
    region: singapore          # Closest region to India
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --config gunicorn.conf.py"
    healthCheckPath: /

    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true    # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: swm-db
          property: connectionString
      - key: GOOGLE_MAPS_API_KEY
        sync: false            # Set manually in Render dashboard
      - key: BREVO_API_KEY
        sync: false            # Set manually in Render dashboard
      - key: MAIL_FROM
        sync: false            # Set manually in Render dashboard
      - key: MAIL_FROM_NAME
        value: Smart Waste Management System
      - key: MAX_CONTENT_LENGTH
        value: "5242880"

databases:
  - name: swm-db
    databaseName: swm_db
    user: swm_user
    plan: free
    region: singapore
